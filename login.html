<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="theme-color" content="#f7efe7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Menú Dashboard">

  <title>Acceso · Gestor del menú</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="login-page">
    <section class="login-card">
      <img src="icon-192.png" alt="" class="login-logo">

      <p class="eyebrow">Menú comedor</p>

      <h1>Acceso al gestor</h1>

      <p class="login-intro">
        Introduce la contraseña para administrar el menú.
      </p>

      <form id="login-form" class="login-form" autocomplete="on">
        <label for="password">Contraseña</label>

        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          autofocus
        >

        <button id="login-button" type="submit">Entrar</button>

        <p
          id="login-message"
          class="login-message"
          role="status"
          aria-live="polite"
        ></p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const button = document.getElementById("login-button");
    const message = document.getElementById("login-message");
    const password = document.getElementById("password");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      button.disabled = true;
      button.textContent = "Comprobando…";
      message.textContent = "";
      message.className = "login-message";

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin",
          body: JSON.stringify({
            password: password.value
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(
            data.error || "La contraseña no es correcta."
          );
        }

        message.textContent = "Acceso correcto.";
        message.className = "login-message login-success";

        window.location.replace("/");
      } catch (error) {
        message.textContent =
          error.message || "No se ha podido iniciar sesión.";

        message.className = "login-message login-error";
        password.select();
      } finally {
        button.disabled = false;
        button.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
